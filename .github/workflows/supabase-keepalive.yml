name: Supabase Keep-Alive

# Ücretsiz Supabase planı, veritabanında 7 gün boyunca hiç sorgu
# çalışmazsa projeyi otomatik duraklatır. Bu iş, haftada iki kez
# gerçek bir veritabanı sorgusu (INSERT) çalıştırarak projeyi
# canlı tutar. 7 günlük sınırın çok altında, güvenli bir aralıktır.
on:
  schedule:
    - cron: '0 3 * * 1,4'   # Her Pazartesi ve Perşembe, 03:00 UTC
  workflow_dispatch: {}      # İsterseniz Actions sekmesinden elle de çalıştırabilirsiniz

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase veritabanına ping at
        env:
          SUPABASE_URL: "https://cbspujgflaznmujvmsoh.supabase.co"
          SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNic3B1amdmbGF6bm11anZtc29oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTI0NjYsImV4cCI6MjA5OTM2ODQ2Nn0.tG70zjmJf68mpj_gvUykN_9-JMD7lrBUX8ko8RO8Yi4"
        run: |
          curl -sf -X POST "$SUPABASE_URL/rest/v1/keepalive" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{}'
          echo "Ping gönderildi: $(date -u)"

